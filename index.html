<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Game rules and shit</title>
    <style>
        body {
            background-color: #0a0a0a; 
            color: #32ff7e; 
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        h1, h2 {
            font-size: 2.5rem;
            color: #32ff7e;
            text-shadow: 0 0 10px #32ff7e;
            border-bottom: 2px solid #32ff7e;
            margin-bottom: 30px;
        }
        h2 { font-size: 1.5rem; border-bottom: 1px solid #1e5128; }
        
        ul { list-style: none; padding: 0; }

        li {
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #1e5128;
            background: rgba(0, 255, 0, 0.05);
        }
        
        kbd {
            background-color: #32ff7e;
            color: #000;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(50, 255, 126, 0.5);
        }

        .btn-container {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .btn {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 35px;
            border: 2px solid #32ff7e;
            background: transparent;
            color: #32ff7e;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #32ff7e;
            color: #000;
            box-shadow: 0 0 20px #32ff7e;
        }

        .btn-danger {
            border-color: #ff3e3e;
            color: #ff3e3e;
        }

        .btn-danger:hover {
            background: #ff3e3e;
            color: #000;
            box-shadow: 0 0 20px #ff3e3e;
        }
    </style>
</head>
<body>

    <h1>> GAME_RULES</h1>
    <ul>
        <li>> PRESS <kbd>Z</kbd> TO INITIATE SELECTION</li>
        <li>> PRESS <kbd>X</kbd> TO DE-REQUISITION</li>
        <li>> PRESS <kbd>ESC</kbd> TO TERMINATE SESSION</li> 
    </ul>

    <h2>NOTE: SYSTEM PROTOCOL SCRATCH_GAME</h2>
    <div class="btn-container">
        <button class="btn" onclick="run()">EXECUTE</button>
        <button class="btn btn-danger" onclick="abort()">ABORT</button>
    </div>

    <script>
        function run(){
            window.location.href="https://undyne-undying.pages.dev";
        }
        function abort(){
            window.location.href="https://google.com";
        }
    </script>
</body>
</html>
